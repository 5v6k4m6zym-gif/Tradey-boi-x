name: Tradey Boi X Scanner

"on":
  schedule:
    - cron: "0 * * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install yfinance ta scikit-learn pandas requests pytz vaderSentiment xgboost
      - name: Run scanner
        env:
          Discordwebhook: ${{ secrets.DISCORDWEBHOOK }}
        run: python scanner.py --once
      - name: Save signal log
        run: |
          git config user.email "actions@github.com"
          git config user.name "Tradey Boi X"
          git add signal_log.json cooldowns.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update signal log [skip ci]"
          git push
