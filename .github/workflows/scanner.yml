name: Tradey Boi X Scanner

"on":
  schedule:
    # Start ~5 min before each session opens and self-loop for the whole
    # session in one job — GitHub's minute-level cron is unreliable at high
    # frequency (hourly schedules were observed firing only ~3x/day instead
    # of ~24x/day), so we no longer depend on repeated cron dispatches to
    # cover a trading session. One job per session, looping internally via
    # `scanner.py --minutes N`, guarantees continuous coverage instead.
    - cron: "55 23 * * 1-5"   # ~09:55 AEST — just before ASX open (10:00)
    - cron: "25 13 * * 1-5"   # ~23:25 AEST — just before US open (23:30)
  workflow_dispatch:
    inputs:
      test_minutes:
        description: "Override time budget in minutes (for manual test runs)"
        required: false
        default: "355"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 370
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('tradey-boi-x/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install yfinance ta scikit-learn pandas requests pytz vaderSentiment xgboost

      - name: Run scanner (continuous loop, bounded to fit the job window)
        env:
          Discordwebhook: ${{ secrets.DISCORDWEBHOOK }}
        run: cd tradey-boi-x && python scanner.py --minutes "${{ github.event.inputs.test_minutes || '355' }}"

      - name: Save signal log
        run: |
          git config user.email "actions@github.com"
          git config user.name "Tradey Boi X"
          git add tradey-boi-x/signal_log.json tradey-boi-x/cooldowns.json tradey-boi-x/mover_cooldowns.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update signal log [skip ci]"
          git pull --rebase --autostash origin main
          git push
