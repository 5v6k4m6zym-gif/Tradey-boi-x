name: Tradey Boi X Scanner

"on":
  schedule:
    - cron: "0 * * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install yfinance ta scikit-learn pandas requests pytz
      - name: Run scanner
        env:
          Discordwebhook: ${{ secrets.DISCORDWEBHOOK }}
        run: python scanner.py --once
