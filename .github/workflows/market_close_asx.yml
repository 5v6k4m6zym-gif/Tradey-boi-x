name: Tradey Boi X ASX Close Report

"on":
  schedule:
    # ASX close ~4pm AEST = ~06:00 UTC Mon-Fri (offset to avoid GH top-of-hour congestion)
    - cron: "22 6 * * 1-5"
  workflow_dispatch:

jobs:
  asx-close:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install yfinance ta scikit-learn pandas requests pytz vaderSentiment xgboost
      - name: Run ASX close report
        env:
          Discordwebhook: ${{ secrets.DISCORDWEBHOOK }}
        run: cd tradey-boi-x && python close_report.py ASX
