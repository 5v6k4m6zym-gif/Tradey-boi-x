name: Tradey Boi X US Close Report

"on":
  schedule:
    # US close 4pm ET = ~20:00 UTC (EDT) Mon-Fri = ~6am AEST next day (offset to avoid GH top-of-hour congestion)
    - cron: "37 20 * * 1-5"
  workflow_dispatch:

jobs:
  us-close:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install yfinance ta scikit-learn pandas requests pytz vaderSentiment xgboost
      - name: Run US close report
        env:
          Discordwebhook: ${{ secrets.DISCORDWEBHOOK }}
        run: cd tradey-boi-x && python close_report.py US
